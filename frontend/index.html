<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TribesCapital" />
    <meta name="theme-color" content="#5B21B6" />
    <meta name="description" content="Clean Energy Investment Platform" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%235B21B6' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>TC</text></svg>" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        position: fixed;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-user-scalable: no;
        -webkit-touch-callout: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <title>TribesCapital - Clean Energy Investment Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      if ('serviceWorker' in navigator && import.meta.env.MODE === 'production') {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      }
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
